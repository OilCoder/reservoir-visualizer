services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # Mount source for hot-reload during development
      - ./src:/app/src
      - ./data:/app/data
      - ./tests:/app/tests
      - ./debug:/app/debug
      - ./app.py:/app/app.py
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
